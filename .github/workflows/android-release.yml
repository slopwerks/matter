name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android-arm64:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      FLUTTER_VERSION: 3.44.6
      JAVA_VERSION: "17"
      ANDROID_NDK_VERSION: 29.0.13113456

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read and validate app version
        id: app_version
        shell: bash
        run: |
          version_line="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml)"
          version_name="${version_line%%+*}"
          version_code="${version_line##*+}"

          if [[ "$version_line" != *+* || ! "$version_code" =~ ^[1-9][0-9]*$ ]]; then
            echo "pubspec version must include a positive build number, for example 0.1.3+2"
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            test "$tag_version" = "$version_name" || {
              echo "Tag v$tag_version does not match pubspec version $version_name"
              exit 1
            }
          fi

          echo "name=$version_name" >> "$GITHUB_OUTPUT"
          echo "code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android NDK
        run: sdkmanager "ndk;${ANDROID_NDK_VERSION}"

      - name: Install cargo-ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate Flutter Rust Bridge bindings
        run: |
          cargo install flutter_rust_bridge_codegen --version 2.12.0
          flutter_rust_bridge_codegen generate

      - name: Prepare signing files
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_PASSWORD"
          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build signed arm64 APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        run: >-
          flutter build apk --release --target-platform android-arm64
          --build-name "${{ steps.app_version.outputs.name }}"
          --build-number "${{ steps.app_version.outputs.code }}"

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/matter-android-arm64.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: matter-android-arm64-apk
          path: build/app/outputs/flutter-apk/matter-android-arm64.apk
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/matter-android-arm64.apk
          generate_release_notes: true
